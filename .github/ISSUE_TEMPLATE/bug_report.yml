name: Bug report
description: Report a reproducible problem in CNN Digit Lab
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the problem and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Draw...\n2. Click...\n3. Observe..."
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser and operating system
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots or relevant console errors. Do not include secrets.

