name: Feature request
description: Suggest an educational or product improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Learning or product problem
      description: What should become clearer or more useful?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed improvement
      description: Explain the idea and how it preserves honest real-vs-simplified labeling.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

